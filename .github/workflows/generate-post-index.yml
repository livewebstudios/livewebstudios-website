name: Generate Post Index

on:
  push:
    paths:
      - '_posts/**'
  workflow_dispatch:

jobs:
  build-index:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate posts/index.json
        run: |
          mkdir -p posts
          node - <<'EOF'
          const fs = require('fs');
          const path = require('path');

          const postsDir = '_posts';
          const outFile = 'posts/index.json';

          if (!fs.existsSync(postsDir)) {
            fs.writeFileSync(outFile, '[]');
            console.log('No _posts directory found. Writing empty index.');
            process.exit(0);
          }

          const files = fs.readdirSync(postsDir).filter(f => f.endsWith('.md'));

          const posts = files.map(filename => {
            const raw = fs.readFileSync(path.join(postsDir, filename), 'utf8')
              .replace(/^\uFEFF/, '')
              .replace(/\r\n/g, '\n')
              .replace(/\r/g, '\n');
            const meta = {};

            const match = raw.match(/^---\r?\n([\s\S]*?)\r?\n---/);
            if (match) {
              match[1].split('\n').forEach(line => {
                const idx = line.indexOf(':');
                if (idx === -1) return;
                const key = line.slice(0, idx).trim();
                let val = line.slice(idx + 1).trim().replace(/^["']|["']$/g, '');
                meta[key] = val;
              });
            }

            const slug = filename.replace(/\.md$/, '');
            const tagsStr = meta.tags || '';
            const categoryFromTags = tagsStr.replace(/[\[\]"]/g, '').split(',')[0].trim();

            return {
              slug,
              filename: '_posts/' + filename,
              title: meta.title || slug,
              date: meta.date || '',
              excerpt: meta.description || meta.excerpt || '',
              thumbnail: meta.image || meta.thumbnail || '',
              category: meta.category || categoryFromTags || ''
            };
          });

          posts.sort((a, b) => new Date(b.date) - new Date(a.date));

          fs.writeFileSync(outFile, JSON.stringify(posts, null, 2));
          console.log('Wrote ' + posts.length + ' post(s) to ' + outFile);
          EOF

      - name: Commit index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/index.json
          git diff --cached --quiet || git commit -m "chore: rebuild post index [skip ci]"
          git push
