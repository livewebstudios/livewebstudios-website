name: Generate Post Index

on:
  push:
    paths:
      - '_posts/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate posts/index.json
        run: |
          mkdir -p posts
          node -e "
          const fs = require('fs');
          const path = require('path');
          const postsDir = '_posts';
          const files = fs.readdirSync(postsDir).filter(f => f.endsWith('.md'));
          const posts = files.map(filename => {
            const content = fs.readFileSync(path.join(postsDir, filename), 'utf8');
            const frontmatter = {};
            const match = content.match(/^---[\r\n]+([\s\S]*?)[\r\n]+---/);
            if (match) {
              match[1].split('\n').forEach(line => {
                const [key, ...val] = line.split(':');
                if (key && val.length) frontmatter[key.trim()] = val.join(':').trim().replace(/^\"|\"$/g, '');
              });
            }
            const slug = filename.replace('.md', '');
            const body = content.replace(/^---[\r\n]+[\s\S]*?[\r\n]+---/, '').trim();
            const excerpt = body.replace(/#+\s/g, '').replace(/\*\*/g, '').substring(0, 160) + '...';
            return {
              slug,
              filename: '_posts/' + filename,
              title: frontmatter.title || slug,
              date: frontmatter.date || '',
              excerpt: frontmatter.description || excerpt,
              thumbnail: frontmatter.image || '',
              category: (frontmatter.tags || '').split(',')[0].replace('[','').replace(']','').trim()
            };
          }).sort((a,b) => new Date(b.date) - new Date(a.date));
          fs.writeFileSync('posts/index.json', JSON.stringify(posts, null, 2));
          console.log('Generated index for ' + posts.length + ' posts');
          "

      - name: Commit index
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posts/index.json
          git diff --staged --quiet || git commit -m "Auto-generate posts/index.json"
          git push